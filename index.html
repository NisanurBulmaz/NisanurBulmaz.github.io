<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>👑 Premium Restoran</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #0f0f0f, #1c1c1c);
    color: #f5d27a;
}

/* HEADER */
header {
    display: flex;
    justify-content: space-between;
    padding: 15px;
    background: rgba(0,0,0,0.9);
    border-bottom: 2px solid gold;
}

/* BUTTON */
button {
    padding: 8px 12px;
    border: none;
    background: gold;
    cursor: pointer;
    margin-left: 5px;
    transition: 0.3s;
}
button:hover {
    transform: scale(1.1);
    background: orange;
}

/* CONTAINER */
.container {
    padding: 20px;
}

/* CATEGORY */
.category h2 {
    border-left: 5px solid gold;
    padding-left: 10px;
}

/* CARD */
.card {
    display: flex;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    border: 1px solid gold;
    border-radius: 15px;
    margin: 15px 0;
    overflow: hidden;
    transition: 0.4s;
}

.card:hover {
    transform: scale(1.03);
    box-shadow: 0 0 20px gold;
}

/* IMAGE */
.card img {
    width: 120px;
    object-fit: cover;
}

/* CONTENT */
.card-content {
    padding: 10px;
    flex: 1;
}

/* PRICE */
.price {
    color: lightgreen;
    font-weight: bold;
}

/* INPUT */
input, textarea {
    width: 100%;
    margin: 5px 0;
    border-radius: 5px;
    border: none;
    padding: 5px;
}

/* POINTS */
.points {
    text-align: center;
    font-size: 20px;
    margin-top: 10px;
}

/* FADE IN */
.fade-in {
    animation: fadeIn 1s ease-in;
}
@keyframes fadeIn {
    from {opacity:0; transform:translateY(20px);}
    to {opacity:1; transform:translateY(0);}
}
</style>

</head>

<body>

<header>
    <h2>👑 Premium Menü</h2>
    <div>
        <button onclick="login('admin')">Admin</button>
        <button onclick="login('user')">Müşteri</button>
        <button onclick="showCart()">Sepet</button>
    </div>
</header>

<div class="points">⭐ Puan: <span id="puan">0</span></div>

<div class="container" id="menu"></div>

<script>
let userType = "guest";
let points = 0;
let cart = [];

// MENÜ + GÖRSELLER
let menuData = {
    "Yemekler": [
        {id:1, name:"Adana Kebap", price:150, img:"https://images.unsplash.com/photo-1604908176997-431c5c6c3b18"},
        {id:2, name:"Lahmacun", price:80, img:"https://images.unsplash.com/photo-1601050690597-df0568f70950"},
        {id:3, name:"Avokado Yatağında Tavuk", price:180, img:"https://images.unsplash.com/photo-1600891964599-f61ba0e24092"}
    ],
    "Çorbalar": [
        {id:4, name:"Mercimek Çorbası", price:60, img:"https://images.unsplash.com/photo-1547592180-85f173990554"},
        {id:5, name:"Domates Çorbası", price:70, img:"https://images.unsplash.com/photo-1604908177522-402c2e2f94b2"},
        {id:6, name:"Mısır Çorbası", price:75, img:"https://images.unsplash.com/photo-1617196034738-26c5a5a4b5d1"}
    ],
    "İçecekler": [
        {id:7, name:"Kola", price:30, img:"https://images.unsplash.com/photo-1580910051074-3eb694886505"},
        {id:8, name:"Ayran", price:25, img:"https://images.unsplash.com/photo-1625944525903-c6b7d62b3f62"}
    ],
    "Alkollü": [
        {id:9, name:"Rakı", price:250, img:"https://images.unsplash.com/photo-1600891963935-9d07d4d4d6c8"},
        {id:10, name:"Viski", price:300, img:"https://images.unsplash.com/photo-1605478371257-16c1d0b1c4a4"},
        {id:11, name:"Votka", price:220, img:"https://images.unsplash.com/photo-1584225064533-6c1c92f2189e"}
    ]
};

// LOGIN
function login(type){
    userType = type;
    alert(type === "admin" ? "Admin giriş" : "Müşteri giriş - Puan kazanırsın ⭐");
}

// MENÜ
function loadMenu(){
    const container = document.getElementById("menu");
    container.innerHTML = "";

    for(let category in menuData){
        container.innerHTML += `<div class="category fade-in"><h2>${category}</h2></div>`;

        menuData[category].forEach(item=>{
            container.innerHTML += `
            <div class="card fade-in">
                <img src="${item.img}">
                <div class="card-content">
                    <h3>${item.name}</h3>
                    <p class="price">${item.price}₺</p>

                    <input id="r${item.id}" placeholder="Çıkartılacak malzemeler">
                    <textarea id="n${item.id}" placeholder="Not"></textarea>

                    <button onclick="addToCart(${item.id}, ${item.price}, '${item.name}')">
                        Sepete Ekle
                    </button>
                </div>
            </div>`;
        });
    }
}

// SEPET
function addToCart(id, price, name){
    let removed = document.getElementById("r"+id).value;
    let note = document.getElementById("n"+id).value;

    cart.push({id, price, name, removed, note});
    alert("Sepete eklendi");
}

// SEPET
function showCart(){
    let text = "🛒 SEPET\n\n";
    cart.forEach(c=> text += `${c.name} - ${c.price}₺\n`);

    if(confirm(text + "\nSipariş ver?")){
        completeOrder();
    }
}

// SİPARİŞ
function completeOrder(){
    cart.forEach(c=>{
        points += Math.floor(c.price/10);
    });

    document.getElementById("puan").innerText = points;
    alert("Sipariş tamamlandı ⭐");
    cart = [];
}

// INIT
loadMenu();
</script>

</body>
</html>
